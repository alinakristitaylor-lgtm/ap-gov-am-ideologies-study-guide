<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Gov: Elite Study Suite</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f1fa-1f1f8.png">
    <style>
        :root { --primary: #1e3799; --secondary: #4a69bd; --accent: #eb2f06; --success: #10ac84; --bg: #f1f2f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3799 0%, #eb2f06 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-container { display: flex; width: 100%; max-width: 850px; margin-bottom: -2px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; border-radius: 15px 15px 0 0; }
        #main-card { background: var(--white); width: 100%; max-width: 850px; border-radius: 0 0 20px 20px; padding: 2.5rem; min-height: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); box-sizing: border-box; text-align: center; }
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .unit-card { background: #f8f9fa; border: 2px solid #eee; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; text-align: left; }
        .unit-card:hover { border-color: var(--secondary); transform: translateY(-3px); }
        .icon-circle { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .mode-btn { padding: 20px; border: 2px solid var(--secondary); border-radius: 12px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .mode-btn:hover { background: var(--secondary); color: white; }
        .hidden { display: none; }
        .action-btn { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        /* Trivia Styles */
        .progress-box { width: 100%; background: #eee; height: 14px; border-radius: 7px; margin-bottom: 2rem; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4a69bd, #eb2f06); transition: 0.4s; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-opt { padding: 16px; border: 2px solid #dcdde1; border-radius: 12px; background: #f8f9fa; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }
        textarea { width: 100%; height: 150px; border-radius: 10px; padding: 15px; margin-top: 10px; border: 2px solid #ddd; font-family: inherit; font-size: 1rem; }
        .rubric-box { display: none; background: #fff3cd; border-left: 6px solid #ffc107; padding: 15px; margin-top: 15px; text-align: left; }
        #review-list { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="nav-container">
    <button class="tab-btn" onclick="showTab('home')" style="background: var(--white); color: var(--primary);">🏠 AP GOV PORTAL</button>
</div>

<div id="main-card">
    <div id="home-content">
        <h1 style="color: var(--primary)">AP Government Study Suite</h1>
        <p>Select a unit to start practicing:</p>
        <div class="home-grid">
            <div class="unit-card" onclick="showUnit('unit1')"><div class="icon-circle">01</div><h3>Foundations of Democracy</h3></div>
            <div class="unit-card" onclick="showUnit('unit2')"><div class="icon-circle">02</div><h3>Branches & Federalism</h3></div>
            <div class="unit-card" onclick="showUnit('unit3')"><div class="icon-circle">03</div><h3>Civil Liberties (Coming)</h3></div>
            <div class="unit-card" onclick="showUnit('unit4')"><div class="icon-circle">04</div><h3>Political Ideologies</h3></div>
            <div class="unit-card" onclick="showUnit('unit5')"><div class="icon-circle">05</div><h3>Participation (Coming)</h3></div>
        </div>
    </div>

    <div id="unit-menu" class="hidden">
        <h2 id="unit-title" style="color: var(--primary)"></h2>
        <div class="mode-select">
            <button class="mode-btn" onclick="startTrivia()">📝 Trivia Mode</button>
            <button class="mode-btn" onclick="startFRQ()">📊 FRQ Practice</button>
        </div>
        <button class="action-btn" style="background: #666" onclick="showTab('home')">← Back to Units</button>
    </div>

    <div id="quiz-content" class="hidden">
        <div class="progress-box"><div id="bar"></div></div>
        <h2 id="q-text" style="color: var(--primary); min-height: 80px;"></h2>
        <div id="opt-container" class="opt-grid"></div>
        <p id="stat-line" style="margin-top:20px; font-weight:bold; color: #666;"></p>
    </div>

    <div id="quiz-results" class="hidden">
        <h2 style="color: var(--primary)">Results & Review</h2>
        <div id="grade-display" style="font-size: 2.2rem; font-weight: bold; margin: 15px 0;"></div>
        <div id="review-list">
            <h3 style="margin-top: 0;">Missed Terms:</h3>
            <ul id="missed-questions" style="list-style: none; padding: 0;"></ul>
        </div>
        <button class="action-btn" onclick="startTrivia()">Try Again</button>
        <button class="action-btn" style="background:#666" onclick="showTab('home')">Home</button>
    </div>

    <div id="frq-content" class="hidden">
        <h2 id="frq-header" style="color: var(--primary)"></h2>
        <div id="frq-display" style="text-align: left;"></div>
        <textarea id="user-ans" placeholder="Type your practice response here..."></textarea>
        <button class="action-btn" onclick="toggleRubric()">Show/Hide Rubric</button>
        <div id="frq-rubric" class="rubric-box"></div>
        <br>
        <button class="action-btn" style="background:#666" onclick="resetUnit()">Exit FRQ</button>
    </div>
</div>

<script>
const data = {
    unit1: {
        title: "Unit 1: Foundations",
        trivia: [
            {q: "The set of rules, institutions, and people who exercise political authority.", a: "Government", options: ["Government", "Politics", "Democracy", "State Sovereignty"]},
            {q: "The process of determining who gets what, when, and how in a society.", a: "Politics", options: ["Politics", "Public Policy", "Civics", "Federalism"]},
            {q: "A system of government where power is vested in the people.", a: "Democracy", options: ["Democracy", "Autocracy", "Theocracy", "Oligarchy"]},
            {q: "Shared beliefs and values about how citizens relate to government.", a: "American Political Culture", options: ["American Political Culture", "Political Ideology", "Socialization", "Partisanship"]},
            {q: "The structures of government like Congress and the Presidency.", a: "Political Institutions", options: ["Political Institutions", "Interest Groups", "Parties", "Bureaucracy"]},
            {q: "A government where representatives are elected and operate under supreme law.", a: "Constitutional Republic", options: ["Constitutional Republic", "Direct Democracy", "Monarchy", "Confederation"]},
            {q: "The document establishing popular sovereignty and natural rights.", a: "Declaration of Independence", options: ["Declaration of Independence", "Articles of Confederation", "Constitution", "Fed 10"]},
            {q: "The supreme law of the U.S. framework.", a: "The Constitution", options: ["The Constitution", "Bill of Rights", "Mayflower Compact", "Magna Carta"]},
            {q: "The first ten amendments protecting individual liberties.", a: "Bill of Rights", options: ["Bill of Rights", "Preamble", "Article I", "Federalist Papers"]},
            {q: "Formal changes made to the Constitution.", a: "Amendments", options: ["Amendments", "Executive Orders", "Statutes", "Ratifications"]},
            {q: "The three distinct parts of U.S. Government.", a: "Legislative, Executive and Judicial", options: ["Legislative, Executive and Judicial", "Federal, State, Local", "Senate, House, Cabinet", "President, VP, Speaker"]},
            {q: "Division of power among branches to prevent tyranny.", a: "Separation of Powers", options: ["Separation of Powers", "Checks and Balances", "Federalism", "Sovereignty"]},
            {q: "System allowing branches to limit each other's power.", a: "Checks and Balances", options: ["Checks and Balances", "Separation of Powers", "Federalism", "Interposition"]},
            {q: "Division of power between national and state governments.", a: "Federalism", options: ["Federalism", "Unitary System", "Confederation", "Devolution"]}
        ],
        frqs: [
            {title: "Quantitative Analysis", prompts: "A) Identify the trend in federal grants to states. B) Describe a reason for categorical grants. C) Explain Cooperative Federalism.", rubric: "Grants increased over time. Money used to meet national goals. Blurring of lines between levels."},
            {title: "Concept Application", prompts: "Scenario: President issues an immigration order. States sue. A) Judicial role? B) Separation of Powers? C) Congressional response?", rubric: "A: Judicial Review. B: Branches limit actions. C: Legislation or funding cut."}
        ]
    },
    unit2: {
        title: "Unit 2: Branches & Federalism",
        trivia: [
            {q: "Rights that people are born with (Locke's idea).", a: "Natural rights", options: ["Natural rights", "Social Contract", "Statutory rights", "Civil liberties"]},
            {q: "Agreement to give up some liberty for government protection.", a: "Social Contract", options: ["Social Contract", "Popular sovereignty", "Republicanism", "Natural law"]},
            {q: "Idea that government's right to rule comes from the people.", a: "Popular sovereignty", options: ["Popular sovereignty", "Republicanism", "Inalienable rights", "Elitism"]},
            {q: "Theory that widespread participation is essential.", a: "Participatory democracy", options: ["Participatory democracy", "Pluralist theory", "Elitist theory", "Republic"]},
            {q: "Theory that policy is a competition among groups.", a: "Pluralist theory", options: ["Pluralist theory", "Elitist theory", "Participatory", "Civil society"]},
            {q: "Theory that a wealthy small group holds most power.", a: "Elitist theory", options: ["Elitist theory", "Pluralist theory", "Constitutionalism", "Federalism"]},
            {q: "A one-house legislature.", a: "Unicameral", options: ["Unicameral", "Bicameral", "Federal", "Confederal"]},
            {q: "Uprising showing the weakness of the Articles.", a: "Shays' Rebellion", options: ["Shays' Rebellion", "Whiskey Rebellion", "Tea Party", "Stono"]},
            {q: "Law punishing a person without a trial (prohibited).", a: "Bill of Attainder", options: ["Bill of Attainder", "Ex post facto law", "Habeas corpus", "Certiorari"]},
            {q: "Large state plan (population based).", a: "Virginia Plan", options: ["Virginia Plan", "New Jersey Plan", "Great Compromise", "3/5ths"]},
            {q: "Small state plan (equal votes).", a: "New Jersey Plan", options: ["New Jersey Plan", "Virginia Plan", "3/5ths", "Great Compromise"]},
            {q: "Created a bicameral legislature.", a: "Great Compromise", options: ["Great Compromise", "3/5ths Compromise", "Grand Committee", "Article V"]},
            {q: "Clause allowing Congress to carry out enumerated powers.", a: "Necessary and proper clause", options: ["Necessary and proper clause", "Commerce clause", "Supremacy", "Elastic clause"]},
            {q: "Established federal supremacy over states.", a: "McCulloch v. Maryland", options: ["McCulloch v. Maryland", "Marbury v. Madison", "U.S. v. Lopez", "Gibbons"]},
            {q: "States must recognize other states' public acts.", a: "Full faith and credit clause", options: ["Full faith and credit clause", "Privileges", "Extradition", "Commerce"]},
            {q: "Powers not given to Feds belong to states.", a: "Tenth amendment", options: ["Tenth amendment", "14th Amendment", "1st Amendment", "9th"]},
            {q: "Powers shared by federal and state governments.", a: "Concurrent powers", options: ["Concurrent powers", "Exclusive", "Reserved", "Denied"]},
            {q: "Federal grants with 'strings attached'.", a: "Categorical grants", options: ["Categorical grants", "Block grants", "Revenue sharing", "Mandates"]},
            {q: "Transferring power from feds back to states.", a: "Devolution", options: ["Devolution", "Federalism", "Incorporation", "Interposition"]}
        ],
        frqs: [{title: "Unit 2 FRQ", prompts: "Explain the difference between categorical and block grants.", rubric: "Categorical = specific purpose. Block = broad flexibility."}]
    },
    unit4: {
        title: "Unit 4: Ideologies",
        trivia: [
            {q: "Set of attitudes shaping political behavior.", a: "Political Culture", options: ["Political Culture", "Ideology", "Socialization", "Public Opinion"]},
            {q: "Belief in self-reliance and getting ahead on your own.", a: "Individualism", options: ["Individualism", "Free Enterprise", "Rule of Law", "Socialism"]},
            {q: "No one, including leaders, is above the law.", a: "Rule of law", options: ["Rule of law", "Individualism", "Privilege", "Right"]},
            {q: "Process of acquiring beliefs (often from family).", a: "Political socialization", options: ["Political socialization", "Globalization", "Weighting", "Polling"]},
            {q: "Adjusting poll results to demographics.", a: "Weighting", options: ["Weighting", "Random selection", "Sampling error", "Focus group"]},
            {q: "Poll taken at the start of a campaign.", a: "Benchmark poll", options: ["Benchmark poll", "Tracking poll", "Exit poll", "Entrance"]},
            {q: "Large-scale survey of the entire public.", a: "Mass survey", options: ["Mass survey", "Focus group", "Sample", "Weighting"]},
            {q: "Using interest rates to control the economy.", a: "Monetary policy", options: ["Monetary policy", "Fiscal Policy", "Keynesianism", "GDP"]},
            {q: "Using taxing and spending to control economy.", a: "Fiscal Policy", options: ["Fiscal Policy", "Monetary policy", "CPI", "Laissez-faire"]},
            {q: "Economic theory favoring tax cuts for businesses.", a: "Supply-side Economics", options: ["Supply-side Economics", "Keynesian", "Socialism", "Communism"]},
            {q: "Measure of goods prices to track inflation.", a: "Consumer Price Index (CPI)", options: ["Consumer Price Index (CPI)", "GDP", "Unemployment", "Monetary"]},
            {q: "Ideology favoring minimal government in all areas.", a: "Libertarianism", options: ["Libertarianism", "Progressivism", "Liberalism", "Conservatism"]}
        ],
        frqs: [{title: "Quantitative Analysis", prompts: "Interpret the relationship between ideology and policy support.", rubric: "Liberals tend to support regulation; Conservatives support free market."}]
    }
};

let currentUnit = '';
let qIdx = 0;
let score = 0;
let missedQuestions = [];
let frqIdx = 0;

function showTab(tab) {
    document.getElementById('home-content').classList.remove('hidden');
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    document.getElementById('frq-content').classList.add('hidden');
}

function showUnit(key) {
    currentUnit = key;
    document.getElementById('home-content').classList.add('hidden');
    document.getElementById('unit-menu').classList.remove('hidden');
    document.getElementById('unit-title').innerText = data[key].title;
}

function startTrivia() {
    if (!data[currentUnit].trivia || data[currentUnit].trivia.length === 0) {
        alert("Trivia for this unit coming soon!"); return;
    }
    qIdx = 0; score = 0; missedQuestions = [];
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    document.getElementById('quiz-content').classList.remove('hidden');
    loadQ();
}

function loadQ() {
    const list = data[currentUnit].trivia;
    const q = list[qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('stat-line').innerText = `Question ${qIdx + 1} of ${list.length}`;
    document.getElementById('bar').style.width = `${((qIdx) / list.length) * 100}%`;
    
    const container = document.getElementById('opt-container');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn-opt';
        btn.innerText = opt;
        btn.onclick = () => {
            const all = document.querySelectorAll('.btn-opt');
            all.forEach(b => b.disabled = true);
            if(opt === q.a) { btn.classList.add('correct'); score++; }
            else { 
                btn.classList.add('wrong'); 
                missedQuestions.push({q: q.q, a: q.a});
                all.forEach(b => { if(b.innerText === q.a) b.classList.add('correct'); });
            }
            setTimeout(() => {
                qIdx++;
                if(qIdx < list.length) loadQ();
                else showResults();
            }, 1200);
        };
        container.appendChild(btn);
    });
}

function showResults() {
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('quiz-results').classList.remove('hidden');
    const total = data[currentUnit].trivia.length;
    const pct = Math.round((score / total) * 100);
    let grade = pct >= 90 ? "A 🇺🇸" : pct >= 80 ? "B" : pct >= 70 ? "C" : "D";
    if(pct < 65) grade = "F";
    
    document.getElementById('grade-display').innerHTML = `<span style="color:${pct >= 70 ? 'var(--success)' : 'var(--accent)'}">${pct}% - Grade: ${grade}</span><br><small>${score}/${total} Correct</small>`;
    
    const mList = document.getElementById('missed-questions');
    mList.innerHTML = '';
    if(missedQuestions.length === 0) {
        mList.innerHTML = "<li>🎉 Perfect Score! Master of Democracy.</li>";
    } else {
        missedQuestions.forEach(m => {
            mList.innerHTML += `<li style="border-bottom:1px solid #ddd; padding:10px 0;"><strong>Q:</strong> ${m.q}<br><span style="color:var(--success)"><strong>Answer:</strong> ${m.a}</span></li>`;
        });
    }
}

function startFRQ() {
    if (!data[currentUnit].frqs || data[currentUnit].frqs.length === 0) {
        alert("FRQ for this unit coming soon!"); return;
    }
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('frq-content').classList.remove('hidden');
    const frq = data[currentUnit].frqs[frqIdx];
    document.getElementById('frq-header').innerText = frq.title;
    document.getElementById('frq-display').innerHTML = `<p style="background:#eee; padding:20px; border-radius:10px; line-height:1.6;">${frq.prompts}</p>`;
    document.getElementById('frq-rubric').innerHTML = `<strong>Scoring Rubric:</strong><br>${frq.rubric}`;
    document.getElementById('frq-rubric').style.display = 'none';
    document.getElementById('user-ans').value = '';
    frqIdx = (frqIdx + 1) % data[currentUnit].frqs.length;
}

function toggleRubric() {
    const r = document.getElementById('frq-rubric');
    r.style.display = r.style.display === 'block' ? 'none' : 'block';
}

function resetUnit() { showUnit(currentUnit); }
</script>
</body>
</html>
