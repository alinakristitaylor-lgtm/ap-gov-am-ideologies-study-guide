<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Gov: Elite Study Suite</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f1fa-1f1f8.png">
    <style>
        :root { --primary: #1e3799; --secondary: #4a69bd; --accent: #eb2f06; --success: #10ac84; --bg: #f1f2f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3799 0%, #eb2f06 100%); min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .nav-container { display: flex; width: 100%; max-width: 850px; margin-bottom: -2px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; border-radius: 15px 15px 0 0; }
        .tab-btn.active { background: var(--white); color: var(--primary); }
        #main-card { background: var(--white); width: 100%; max-width: 850px; border-radius: 0 0 20px 20px; padding: 2.5rem; min-height: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .home-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
        .unit-card { background: #f8f9fa; border: 2px solid #eee; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 20px; }
        .unit-card:hover { border-color: var(--secondary); transform: translateY(-3px); }
        .icon-circle { background: var(--primary); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .mode-btn { padding: 20px; border: 2px solid var(--secondary); border-radius: 12px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; }
        .mode-btn:hover { background: var(--secondary); color: white; }
        .hidden { display: none; }
        .action-btn { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        /* Graph/Trivia Styles */
        .progress-box { width: 100%; background: #eee; height: 14px; border-radius: 7px; margin-bottom: 2rem; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4a69bd, #eb2f06); }
        .btn-opt { padding: 16px; border: 2px solid #ddd; margin: 5px; border-radius: 10px; cursor: pointer; width: 100%; }
        .correct { background: var(--success); color: white; }
        .wrong { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="nav-container">
    <button id="tab-home" class="tab-btn active" onclick="showTab('home')">🏠 Home</button>
</div>

<div id="main-card">
    <div id="home-content">
        <h1>AP Government Portal</h1>
        <div class="unit-card" onclick="showUnit('unit1')"><div class="icon-circle">01</div><h3>Unit 1: Foundations of American Democracy</h3></div>
        <div class="unit-card" onclick="showUnit('unit4')"><div class="icon-circle">04</div><h3>Unit 4: American Political Ideologies</h3></div>
    </div>

    <div id="unit-menu" class="hidden">
        <h2 id="unit-title"></h2>
        <div class="mode-select">
            <button class="mode-btn" onclick="initActivity('trivia')">📝 Trivia</button>
            <button class="mode-btn" onclick="initActivity('frq')">📊 Data FRQ</button>
        </div>
        <button class="action-btn" onclick="showTab('home')">Back Home</button>
    </div>

    <div id="game-content" class="hidden">
        <div id="game-inner"></div>
        <button class="action-btn" onclick="resetUnit()">Exit</button>
    </div>
</div>

<script>
const data = {
    unit1: {
        title: "Unit 1: Foundations of Democracy",
        trivia: [{q: "Compromise that created a bicameral legislature.", a: "Great Compromise", options: ["Great Compromise", "3/5ths Compromise", "New Jersey Plan", "Virginia Plan"]}, {q: "System where power is divided between national and state levels.", a: "Federalism", options: ["Federalism", "Unitary", "Confederacy", "Democracy"]}],
        frqs: [{title: "Separation of Powers", prompts: "Explain how checks and balances limit presidential power.", rubric: "Mention veto override, appointment confirmation, and impeachment."}]
    },
    unit4: {
        title: "Unit 4: Political Ideologies",
        trivia: [{q: "The set of attitudes and beliefs that shape political behavior.", a: "Political Culture", options: ["Political Culture", "Socialization", "Ideology", "Public Opinion"]}],
        frqs: [{title: "Voter Turnout Trends", prompts: "Describe the trend in turnout by age.", rubric: "Turnout increases with age."}]
    }
};

let currentUnit = 'unit1';

function showTab(tab) {
    document.getElementById('home-content').classList.remove('hidden');
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('game-content').classList.add('hidden');
}

function showUnit(unitKey) {
    document.getElementById('home-content').classList.add('hidden');
    currentUnit = unitKey;
    document.getElementById('unit-menu').classList.remove('hidden');
    document.getElementById('unit-title').innerText = data[unitKey].title;
}

function initActivity(type) {
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('game-content').classList.remove('hidden');
    document.getElementById('game-inner').innerHTML = `<h3>Starting ${type} for ${data[currentUnit].title}...</h3><p><em>(Game logic active)</em></p>`;
}

function resetUnit() {
    document.getElementById('game-content').classList.add('hidden');
    showUnit(currentUnit);
}
</script>
</body>
</html>
