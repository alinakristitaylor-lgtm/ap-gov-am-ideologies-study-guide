        .tab-btn { flex: 1; padding: 15px; border: none; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; border-radius: 15px 15px 0 0; }
        #main-card { background: var(--white); width: 100%; max-width: 850px; border-radius: 0 0 20px 20px; padding: 2.5rem; min-height: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); box-sizing: border-box; text-align: center; }
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .unit-card { background: #f8f9fa; border: 2px solid #eee; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; text-align: left; }
        .unit-card:hover { border-color: var(--secondary); transform: translateY(-3px); }
        .icon-circle { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .mode-btn { padding: 20px; border: 2px solid var(--secondary); border-radius: 12px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .mode-btn:hover { background: var(--secondary); color: white; }
        .hidden { display: none; }
        .action-btn { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        /* Trivia Styles */
        .progress-box { width: 100%; background: #eee; height: 14px; border-radius: 7px; margin-bottom: 2rem; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4a69bd, #eb2f06); transition: 0.4s; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-opt { padding: 16px; border: 2px solid #dcdde1; border-radius: 12px; background: #f8f9fa; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }
        textarea { width: 100%; height: 150px; border-radius: 10px; padding: 15px; margin-top: 10px; border: 2px solid #ddd; font-family: inherit; font-size: 1rem; }
        .rubric-box { display: none; background: #fff3cd; border-left: 6px solid #ffc107; padding: 15px; margin-top: 15px; text-align: left; }
        #review-list { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #ddd; }
        /* Graph Styling */
        .graph-container { background: #fdfdfd; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin: 15px 0; display: flex; justify-content: center; }
    </style>
</head>

        <br>

    </div>
</div>

    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    document.getElementById('frq-content').classList.add('hidden');
}

function showUnit(key) {
    currentUnit = key;
    document.getElementById('home-content').classList.add('hidden');
    document.getElementById('unit-menu').classList.remove('hidden');
    document.getElementById('unit-title').innerText = data[key].title;
}

function startTrivia() {
    if (!data[currentUnit].trivia || data[currentUnit].trivia.length === 0) {
        alert("Trivia for this unit coming soon!"); return;
    }
    qIdx = 0; score = 0; missedQuestions = [];
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    document.getElementById('quiz-content').classList.remove('hidden');
    loadQ();
}

function loadQ() {
    const list = data[currentUnit].trivia;
    const q = list[qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('stat-line').innerText = `Question ${qIdx + 1} of ${list.length}`;
    document.getElementById('bar').style.width = `${((qIdx) / list.length) * 100}%`;
    
    const container = document.getElementById('opt-container');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn-opt';
        btn.innerText = opt;
        btn.onclick = () => {
            const all = document.querySelectorAll('.btn-opt');
            all.forEach(b => b.disabled = true);
            if(opt === q.a) { btn.classList.add('correct'); score++; }
            else { 
                btn.classList.add('wrong'); 
                missedQuestions.push({q: q.q, a: q.a});
                all.forEach(b => { if(b.innerText === q.a) b.classList.add('correct'); });
            }
            setTimeout(() => {
                qIdx++;
                if(qIdx < list.length) loadQ();
                else showResults();
            }, 1200);
        };
        container.appendChild(btn);
    });
}

function showResults() {
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('quiz-results').classList.remove('hidden');
    const total = data[currentUnit].trivia.length;
    const pct = Math.round((score / total) * 100);
    let grade = pct >= 90 ? "A 🇺🇸" : pct >= 80 ? "B" : pct >= 70 ? "C" : "D";
    if(pct < 65) grade = "F";
    
    document.getElementById('grade-display').innerHTML = `<span style="color:${pct >= 70 ? 'var(--success)' : 'var(--accent)'}">${pct}% - Grade: ${grade}</span><br><small>${score}/${total} Correct</small>`;
    
    const mList = document.getElementById('missed-questions');
    mList.innerHTML = '';
    if(missedQuestions.length === 0) {
        mList.innerHTML = "<li>🎉 Perfect Score! Master of Democracy.</li>";
    } else {
        missedQuestions.forEach(m => {
            mList.innerHTML += `<li style="border-bottom:1px solid #ddd; padding:10px 0;"><strong>Q:</strong> ${m.q}<br><span style="color:var(--success)"><strong>Answer:</strong> ${m.a}</span></li>`;
        });
    }
}

function startFRQ() {
    const unitData = data[currentUnit];
    if (!unitData.frqs || unitData.frqs.length === 0) {
        alert("FRQ for this unit coming soon!"); return;
    }
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('frq-content').classList.remove('hidden');
    
    // Safety check for index
    if (frqIdx >= unitData.frqs.length) frqIdx = 0;
    
    const frq = unitData.frqs[frqIdx];
    document.getElementById('frq-header').innerText = frq.title;
    document.getElementById('frq-display').innerHTML = `<p style="background:#eee; padding:20px; border-radius:10px; line-height:1.6;">${frq.prompts}</p>`;
    
    // Handle Graph rendering
    const gBox = document.getElementById('frq-graph');
    if (frq.graph) {
        gBox.innerHTML = frq.graph;
        gBox.classList.remove('hidden');
    } else {
        gBox.classList.add('hidden');
    }

    document.getElementById('frq-rubric').innerHTML = `<strong>Scoring Rubric:</strong><br>${frq.rubric}`;
    document.getElementById('frq-rubric').style.display = 'none';
    document.getElementById('user-ans').value = '';
    
    // Cycle to next FRQ for next session
    frqIdx = (frqIdx + 1) % unitData.frqs.length;
}

function toggleRubric() {
    const r = document.getElementById('frq-rubric');
    r.style.display = r.style.display === 'block' ? 'none' : 'block';
}

function resetUnit() { showUnit(currentUnit); }
</script>
</body>
</html>
