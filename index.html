<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Gov: Elite Study Suite</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f1fa-1f1f8.png">
    <style>
        :root { --primary: #1e3799; --secondary: #4a69bd; --accent: #eb2f06; --success: #10ac84; --bg: #f1f2f6; --white: #ffffff; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #1e3799 0%, #eb2f06 100%); 
            background-attachment: fixed;
            min-height: 100vh; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .nav-container { display: flex; width: 100%; max-width: 850px; margin-bottom: -2px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; border-radius: 15px 15px 0 0; }

        #main-card { 
            background: var(--white); 
            width: 100%; 
            max-width: 850px; 
            border-radius: 15px; 
            padding: 1.5rem; 
            min-height: 600px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            box-sizing: border-box; 
            text-align: center; 
        }

        /* Responsive Grid: Stacks on mobile, 2-col on desktop */
        .home-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }

        .unit-card { 
            background: #f8f9fa; 
            border: 2px solid #eee; 
            padding: 15px; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-align: left; 
        }

        .unit-card:hover { border-color: var(--secondary); transform: translateY(-3px); }
        
        .icon-circle { 
            background: var(--primary); color: white; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; flex-shrink: 0; 
        }

        /* Responsive Mode Selection */
        .mode-select { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            margin-top: 20px; 
        }

        .mode-btn { 
            padding: 18px; 
            border: 2px solid var(--secondary); 
            border-radius: 12px; 
            background: white; 
            color: var(--primary); 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem; 
        }

        .hidden { display: none; }

        .action-btn { 
            background: var(--primary); color: white; padding: 12px 24px; 
            border: none; border-radius: 8px; cursor: pointer; 
            margin-top: 15px; font-weight: bold; width: 100%; max-width: 300px;
        }

        /* Trivia/Quiz Styles */
        .progress-box { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 1.5rem; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4a69bd, #eb2f06); transition: 0.4s; }
        
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-opt { padding: 14px; border: 2px solid #dcdde1; border-radius: 10px; background: #f8f9fa; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }

        textarea { width: 100%; height: 150px; border-radius: 10px; padding: 15px; margin-top: 10px; border: 2px solid #ddd; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        
        .rubric-box { display: none; background: #fff3cd; border-left: 6px solid #ffc107; padding: 15px; margin-top: 15px; text-align: left; font-size: 0.95rem; }
        
        /* Responsive Graphs */
        .graph-container { 
            background: #fdfdfd; border: 1px solid #ddd; padding: 10px; 
            border-radius: 8px; margin: 15px 0; display: flex; justify-content: center; 
        }
        .graph-container svg { width: 100%; height: auto; max-width: 400px; }

        /* Desktop Adjustments */
        @media (min-width: 650px) {
            #main-card { padding: 2.5rem; border-radius: 0 0 20px 20px; }
            .mode-select { grid-template-columns: 1fr 1fr; }
            .opt-grid { grid-template-columns: 1fr 1fr; }
            .action-btn { width: auto; }
        }
    </style>
</head>
<body>

<div class="nav-container">
    <button class="tab-btn" onclick="showTab('home')" style="background: var(--white); color: var(--primary);">🏠 AP GOV PORTAL</button>
</div>

    <div id="quiz-content" class="hidden">

    <div id="quiz-results" class="hidden">

    <div id="frq-content" class="hidden">

        <div id="frq-graph" class="graph-container hidden"></div>

        <button class="action-btn" onclick="toggleRubric()">Show/Hide Rubric</button>
        <div id="frq-rubric" class="rubric-box"></div>
        <br>
        <button class="action-btn" style="background:#666" onclick="resetUnit()">Exit FRQ</button>
    </div>
</div>

let frqIdx = 0;

function showTab(tab) {
    document.getElementById('home-content').classList.remove('hidden');
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    document.getElementById('frq-content').classList.add('hidden');
}

function showUnit(key) {
    currentUnit = key;
    document.getElementById('home-content').classList.add('hidden');
    document.getElementById('unit-menu').classList.remove('hidden');
    document.getElementById('unit-title').innerText = data[key].title;
}

function startTrivia() {
    qIdx = 0; score = 0; missedQuestions = [];
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    document.getElementById('quiz-content').classList.remove('hidden');
    loadQ();
}

function loadQ() {
    const list = data[currentUnit].trivia;
    const q = list[qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('stat-line').innerText = `Question ${qIdx + 1} of ${list.length}`;
    document.getElementById('bar').style.width = `${((qIdx) / list.length) * 100}%`;
    const container = document.getElementById('opt-container');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn-opt';
        btn.innerText = opt;
        btn.onclick = () => {
            const all = document.querySelectorAll('.btn-opt');
            all.forEach(b => b.disabled = true);
            if(opt === q.a) { btn.classList.add('correct'); score++; }
            else { 
                btn.classList.add('wrong'); 
                missedQuestions.push({q: q.q, a: q.a});
                all.forEach(b => { if(b.innerText === q.a) b.classList.add('correct'); });
            }
            setTimeout(() => {
                qIdx++;
                if(qIdx < list.length) loadQ();
                else showResults();
            }, 1000);
        };
        container.appendChild(btn);
    });
}

function showResults() {
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('quiz-results').classList.remove('hidden');
    const total = data[currentUnit].trivia.length;
    const pct = Math.round((score / total) * 100);
    let grade = pct >= 90 ? "A 🇺🇸" : pct >= 80 ? "B" : pct >= 70 ? "C" : "D";
    document.getElementById('grade-display').innerHTML = `<span style="color:${pct >= 70 ? 'var(--success)' : 'var(--accent)'}">${pct}% - ${grade}</span><br><small>${score}/${total} Correct</small>`;
    const mList = document.getElementById('missed-questions');
    mList.innerHTML = '';
    if(missedQuestions.length === 0) mList.innerHTML = "<li>🎉 Perfect Score!</li>";
    else missedQuestions.forEach(m => { mList.innerHTML += `<li style="padding:8px 0; border-bottom:1px solid #ddd;"><strong>Q:</strong> ${m.q}<br><span style="color:var(--success)"><strong>Correct:</strong> ${m.a}</span></li>`; });
}

function startFRQ() {
    const unitData = data[currentUnit];
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('frq-content').classList.remove('hidden');
    if (frqIdx >= unitData.frqs.length) frqIdx = 0;
    const frq = unitData.frqs[frqIdx];
    document.getElementById('frq-header').innerText = frq.title;
    document.getElementById('frq-display').innerHTML = `<p style="background:#eee; padding:15px; border-radius:10px;">${frq.prompts}</p>`;
    const gBox = document.getElementById('frq-graph');
    if (frq.graph) { gBox.innerHTML = frq.graph; gBox.classList.remove('hidden'); }
    else gBox.classList.add('hidden');
    document.getElementById('frq-rubric').innerHTML = `<strong>Scoring Rubric:</strong><br>${frq.rubric}`;
    document.getElementById('frq-rubric').style.display = 'none';
    document.getElementById('user-ans').value = '';
}

function toggleRubric() {
    const r = document.getElementById('frq-rubric');
    r.style.display = r.style.display === 'block' ? 'none' : 'block';
}

function resetUnit() { showUnit(currentUnit); }
</script>
</body>
</html>
