<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Gov: Elite Study Suite</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f1fa-1f1f8.png">
    <style>
        :root { --primary: #1e3799; --secondary: #4a69bd; --accent: #eb2f06; --success: #10ac84; --bg: #f1f2f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3799 0%, #eb2f06 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-container { display: flex; width: 100%; max-width: 850px; margin-bottom: -2px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; border-radius: 15px 15px 0 0; }
        #main-card { background: var(--white); width: 100%; max-width: 850px; border-radius: 0 0 20px 20px; padding: 2.5rem; min-height: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); box-sizing: border-box; }
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .unit-card { background: #f8f9fa; border: 2px solid #eee; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .unit-card:hover { border-color: var(--secondary); transform: translateY(-3px); }
        .icon-circle { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .mode-btn { padding: 20px; border: 2px solid var(--secondary); border-radius: 12px; background: white; color: var(--primary); font-weight: bold; cursor: pointer; }
        .mode-btn:hover { background: var(--secondary); color: white; }
        .hidden { display: none; }
        .action-btn { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        /* Game Styles */
        .progress-box { width: 100%; background: #eee; height: 14px; border-radius: 7px; margin-bottom: 2rem; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4a69bd, #eb2f06); transition: 0.4s; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-opt { padding: 16px; border: 2px solid #dcdde1; border-radius: 12px; background: #f8f9fa; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }
        textarea { width: 100%; height: 120px; border-radius: 10px; padding: 10px; margin-top: 10px; border: 2px solid #ddd; }
        .rubric-box { display: none; background: #fff3cd; border-left: 6px solid #ffc107; padding: 15px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

<div class="nav-container">
    <button id="tab-home" class="tab-btn" onclick="showTab('home')" style="background: var(--white); color: var(--primary);">🏠 Home</button>
</div>

<div id="main-card">
    <div id="home-content">
        <h1>AP Government Study Portal</h1>
        <p>Select a unit to begin your review:</p>
        <div class="home-grid">
            <div class="unit-card" onclick="showUnit('unit1')"><div class="icon-circle">01</div><h3>Foundations</h3></div>
            <div class="unit-card" onclick="showUnit('unit2')"><div class="icon-circle">02</div><h3>Branches</h3></div>
            <div class="unit-card" onclick="showUnit('unit3')"><div class="icon-circle">03</div><h3>Civil Liberties</h3></div>
            <div class="unit-card" onclick="showUnit('unit4')"><div class="icon-circle">04</div><h3>Ideologies</h3></div>
            <div class="unit-card" onclick="showUnit('unit5')"><div class="icon-circle">05</div><h3>Participation</h3></div>
        </div>
    </div>

    <div id="unit-menu" class="hidden">
        <h2 id="unit-title" style="color: var(--primary)"></h2>
        <div class="mode-select">
            <button class="mode-btn" onclick="startTrivia()">📝 Start Trivia</button>
            <button class="mode-btn" onclick="startFRQ()">📊 Data FRQ</button>
        </div>
        <button class="action-btn" style="background: #666" onclick="showTab('home')">← Back to Units</button>
    </div>

    <div id="quiz-content" class="hidden">
        <div class="progress-box"><div id="bar"></div></div>
        <h2 id="q-text" style="color: var(--primary)"></h2>
        <div id="opt-container" class="opt-grid"></div>
        <p id="stat-line" style="margin-top:20px; font-weight:bold; color: #666;"></p>
    </div>

    <div id="frq-content" class="hidden">
        <h2 id="frq-unit-title"></h2>
        <div id="frq-display"></div>
        <textarea id="user-ans" placeholder="Draft your FRQ response here..."></textarea>
        <button class="action-btn" onclick="toggleRubric()">Check Rubric</button>
        <div id="frq-rubric" class="rubric-box"></div>
        <br>
        <button class="action-btn" style="background:#666" onclick="resetUnit()">Exit Practice</button>
    </div>
</div>

<script>
const data = {
    unit1: {
        title: "Unit 1: Foundations",
        trivia: [
            {q: "Compromise that created a bicameral legislature.", a: "Great Compromise", options: ["Great Compromise", "3/5ths Compromise", "New Jersey Plan", "Virginia Plan"]},
            {q: "System where power is divided between national and state levels.", a: "Federalism", options: ["Federalism", "Unitary", "Confederacy", "Democracy"]}
        ],
        frqs: [{title: "Separation of Powers", prompts: "Explain how checks and balances limit presidential power.", rubric: "Mention veto override, appointment confirmation, and impeachment."}]
    },
    unit2: { title: "Unit 2: Branches", trivia: [], frqs: [] },
    unit3: { title: "Unit 3: Civil Rights", trivia: [], frqs: [] },
    unit4: {
        title: "Unit 4: Ideologies",
        trivia: [
            {q: "The set of attitudes and beliefs that shape political behavior in a country.", a: "Political Culture", options: ["Political Culture", "Political Ideology", "Socialization", "Public Opinion"]},
            {q: "The belief in self-reliance and that people should get ahead on their own.", a: "Individualism", options: ["Individualism", "Free Enterprise", "Rule of Law", "Socialism"]},
            {q: "An economic system where the market determines prices with little government interference.", a: "Laissez-faire/free enterprise", options: ["Laissez-faire/free enterprise", "Command Economy", "Mixed Economy", "Keynesianism"]},
            {q: "No one, including leaders, is above the law.", a: "Rule of law", options: ["Rule of law", "Individualism", "Privilege", "Right"]},
            {q: "The process by which one acquires their political beliefs, often starting with family.", a: "Political socialization", options: ["Political socialization", "Globalization", "Generational effect", "Weighting"]},
            {q: "Impact of major historical events on a specific age group's political views.", a: "Generational effect", options: ["Generational effect", "Life-cycle effect", "Globalization", "Socialization"]},
            {q: "The trend of increasing global interconnectedness.", a: "Globalization", options: ["Globalization", "Outsourcing", "Fiscal Policy", "Monetary policy"]},
            {q: "Adjusting poll results to match the known demographics of a population.", a: "Weighting", options: ["Weighting", "Random selection", "Sampling error", "Focus group"]},
            {q: "A poll conducted as voters enter a voting location.", a: "Entrance survey", options: ["Entrance survey", "Exit poll", "Tracking poll", "Benchmark poll"]},
            {q: "Continuous polls used to chart a candidate's daily rise or fall.", a: "Tracking polls", options: ["Tracking polls", "Benchmark poll", "Mass survey", "Scientific poll"]},
            {q: "A large-scale survey of the entire public's opinion.", a: "Mass survey", options: ["Mass survey", "Focus group", "Sample", "Weighting"]},
            {q: "Error resulting from the size or design of a poll's sample.", a: "Sampling error", options: ["Sampling error", "Question wording", "Question order", "Weighting"]},
            {q: "Using interest rates and money supply to control the economy.", a: "Monetary policy", options: ["Monetary policy", "Fiscal Policy", "Keynesianism", "GDP"]},
            {q: "Using taxing and spending to control the economy.", a: "Fiscal Policy", options: ["Fiscal Policy", "Monetary policy", "Laissez-faire", "CPI"]},
            {q: "Health insurance for the elderly.", a: "Medicare", options: ["Medicare", "Medicaid", "Social Security", "HMO"]},
            {q: "Health insurance for low-income individuals.", a: "Medicaid", options: ["Medicaid", "Medicare", "SNAP", "TANF"]},
            {q: "Economic theory favoring tax cuts for businesses to stimulate growth.", a: "Supply-side Economics", options: ["Supply-side Economics", "Keynesian Economics", "Socialism", "Communism"]},
            {q: "Economic theory favoring government spending to boost demand.", a: "Keynesian Economics", options: ["Keynesian Economics", "Supply-side Economics", "Monetary policy", "Capitalism"]},
            {q: "The total value of all goods and services produced in a year.", a: "Gross Domestic Product (GDP)", options: ["Gross Domestic Product (GDP)", "CPI", "Inflation", "Recession"]},
            {q: "Measures the change in prices of a 'basket' of goods to track inflation.", a: "Consumer Price Index (CPI)", options: ["Consumer Price Index (CPI)", "GDP", "Unemployment rate", "Monetary policy"]},
            {q: "A period of two consecutive quarters of negative GDP growth.", a: "Economic recession", options: ["Economic recession", "Inflation", "Deflation", "Stagflation"]},
            {q: "An economy where the government makes all decisions.", a: "Command-and-control economy", options: ["Command-and-control economy", "Mixed economy", "Capitalism", "Laissez-faire"]},
            {q: "An economy combining private enterprise and government regulation.", a: "Mixed economy", options: ["Mixed economy", "Command economy", "Socialism", "Pure Capitalism"]},
            {q: "A small group (10-15) used for in-depth discussion of issues.", a: "Focus group", options: ["Focus group", "Mass survey", "Scientific poll", "Random selection"]},
            {q: "Every person has an equal chance of being selected for a poll.", a: "Random selection", options: ["Random selection", "Weighting", "Stratified sampling", "Sample"]},
            {q: "A poll taken at the very start of a campaign.", a: "Benchmark poll", options: ["Benchmark poll", "Tracking poll", "Exit poll", "Entrance survey"]},
            {q: "A belief in individual liberty and minimal government in all areas.", a: "Libertarianism", options: ["Libertarianism", "Progressivism", "Liberalism", "Conservatism"]},
            {q: "Belief in traditional values and smaller government in the economy.", a: "Conservatism", options: ["Conservatism", "Liberalism", "Socialism", "Communism"]},
            {q: "Moving production to other countries to save costs.", a: "Outsourcing", options: ["Outsourcing", "Globalization", "Free Enterprise", "Capitalism"]},
            {q: "Something the government is obligated to provide/protect.", a: "Right", options: ["Right", "Privilege", "Power", "Responsibility"]},
            {q: "A benefit that can be granted or taken away.", a: "Privilege", options: ["Privilege", "Right", "Liberty", "Mandate"]},
            {q: "A system where the means of production are privately owned.", a: "Capitalism", options: ["Capitalism", "Socialism", "Communism", "Command economy"]},
            {q: "Political attitudes change as you get older.", a: "Life-cycle effect", options: ["Life-cycle effect", "Generational effect", "Globalization", "Socialization"]},
            {q: "Ideology focused on social reform and wealth redistribution.", a: "Progressivism", options: ["Progressivism", "Libertarianism", "Conservatism", "Capitalism"]},
            {q: "The rise in general price levels over time.", a: "Inflation", options: ["Inflation", "Recession", "GDP", "CPI"]}
        ],
        frqs: [{title: "Quantitative Analysis", prompts: "Interpret the relationship between ideology and policy support.", rubric: "Key focus on economic regulation vs. social liberty."}]
    },
    unit5: { title: "Unit 5: Participation", trivia: [], frqs: [] }
};

let currentUnit = '';
let qIdx = 0;
let score = 0;

function showTab(type) {
    document.getElementById('home-content').classList.remove('hidden');
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-content').classList.add('hidden');
    document.getElementById('frq-content').classList.add('hidden');
}

function showUnit(key) {
    currentUnit = key;
    document.getElementById('home-content').classList.add('hidden');
    document.getElementById('unit-menu').classList.remove('hidden');
    document.getElementById('unit-title').innerText = data[key].title;
}

function startTrivia() {
    if (data[currentUnit].trivia.length === 0) {
        alert("Trivia for this unit is coming soon!");
        return;
    }
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('quiz-content').classList.remove('hidden');
    qIdx = 0; score = 0;
    loadQ();
}

function loadQ() {
    const unitTrivia = data[currentUnit].trivia;
    const q = unitTrivia[qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('stat-line').innerText = `Question: ${qIdx + 1} / ${unitTrivia.length}`;
    document.getElementById('bar').style.width = `${((qIdx) / unitTrivia.length) * 100}%`;
    
    const container = document.getElementById('opt-container');
    container.innerHTML = '';
    
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn-opt';
        btn.innerText = opt;
        btn.onclick = () => {
            const btns = document.querySelectorAll('.btn-opt');
            btns.forEach(b => b.disabled = true);
            if(opt === q.a) { btn.classList.add('correct'); score++; }
            else { btn.classList.add('wrong'); }
            
            setTimeout(() => {
                qIdx++;
                if(qIdx < unitTrivia.length) loadQ();
                else {
                    alert(`Unit Review Complete! Score: ${score}/${unitTrivia.length}`);
                    resetUnit();
                }
            }, 1000);
        };
        container.appendChild(btn);
    });
}

function startFRQ() {
    if (data[currentUnit].frqs.length === 0) {
        alert("FRQs for this unit are coming soon!");
        return;
    }
    document.getElementById('unit-menu').classList.add('hidden');
    document.getElementById('frq-content').classList.remove('hidden');
    const frq = data[currentUnit].frqs[0];
    document.getElementById('frq-unit-title').innerText = frq.title;
    document.getElementById('frq-display').innerHTML = `<p style="background:#eee; padding:15px; border-radius:8px;">${frq.prompts}</p>`;
    document.getElementById('frq-rubric').innerHTML = `<strong>Scoring Rubric:</strong><br>${frq.rubric}`;
    document.getElementById('frq-rubric').style.display = 'none';
}

function toggleRubric() {
    const r = document.getElementById('frq-rubric');
    r.style.display = (r.style.display === 'block') ? 'none' : 'block';
}

function resetUnit() { showUnit(currentUnit); }
</script>
</body>
</html>
